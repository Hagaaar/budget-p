<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>S.A.H</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap');
  
  :root {
    --mono: 'DM Mono', ui-monospace, monospace;
    --sans: 'DM Sans', -apple-system, system-ui, sans-serif;
    --anas: #ffb347;
    --hicham: #7ed9a0;
    --saad: #93c5fd;
    --win: #3ddc84;
    --loss: #ff4545;
    --gold: #f0c040;
    --bg-dark: #0e0e0e;
    --card-bg: #141414;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg-dark); }
  body {
    font-family: var(--sans);
    color: #e8e8e8;
    font-size: 13px;
    min-height: 100vh;
    max-width: 390px;
    margin: 0 auto;
    padding: 16px 14px 50px;
  }
  
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
  input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number], input[type=password] { -moz-appearance: textfield; }
  button { font-family: var(--mono); cursor: pointer; border: none; background: none; color: inherit; }
  
  .mono { font-family: var(--mono); }
  .sectitle { font-family: var(--mono); font-size: 8px; letter-spacing: .2em; color: #444; text-transform: uppercase; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #1c1c1c; }
  .card { background: var(--card-bg); border: 1px solid #1f1f1f; border-radius: 8px; }
  
  .edt { cursor: pointer; border-bottom: 1px dotted #2a2a2a; user-select: none; display: inline-block; min-width: 18px; }
  .edt:hover { border-bottom-color: #555; }
  .editinput { font-family: var(--mono); font-size: inherit; color: #e8e8e8; background: transparent; border: none; border-bottom: 1px solid var(--anas); outline: none; text-align: center; width: 60px; }
  .editinput.sm { width: 44px; }
  
  .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; width: 100%; }
  header h1 { font-family: var(--mono); font-size: 22px; font-weight: 500; letter-spacing: -.02em; line-height: 1; }
  
  .sync-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: none;
    padding: 6px 0;
    font-family: var(--mono);
    font-size: 9px;
    text-transform: uppercase;
    color: #888;
    cursor: pointer;
    transition: opacity 0.2s ease;
  }
  .sync-badge:active { opacity: 0.6; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: #444; transition: background 0.3s ease; box-shadow: 0 0 4px rgba(0,0,0,0.3); }
  
  .tabs { display: flex; gap: 3px; background: #111; padding: 3px; border-radius: 10px; border: 1px solid #1c1c1c; margin-bottom: 8px; }
  .tab { flex: 1; padding: 9px 0; border-radius: 8px; color: #555; font-size: 11px; letter-spacing: .06em; transition: all 0.2s ease; }
  .tab.on { background: #242424; color: #e8e8e8; font-weight: 500; }
  
  .saisie-wrapper { width:100%; margin-bottom:8px; }

  .saisie-onglets {
    display: flex;
    gap: 0;
    margin-bottom: 0;
    overflow: visible;
    position: relative;
    z-index: 2;
  }

  .saisie-onglets button {
    flex: 1;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #444;
    font-weight: 500;
    padding: 11px 0;
    background: transparent;
    border-radius: 10px 10px 0 0;
    border: 1px solid #1f1f1f;
    border-bottom: none;
    position: relative;
    z-index: 1;
    margin-right: -1px;
  }
  .saisie-onglets button:last-child { margin-right: 0; }

  /* Onglet actif : dépasse d'1px vers le bas pour effacer la bordure du bloc */
  .saisie-onglets button.active-tab {
    background: var(--tab-bg);
    border-color: var(--tab-bord);
    border-bottom: none;
    color: var(--tab-col) !important;
    z-index: 3;
    margin-bottom: -1px;
    padding-bottom: 12px;
  }

  /* Coins concaves — positionnés SOUS l'onglet, dans la zone carte */
  .saisie-onglets button.active-tab::before,
  .saisie-onglets button.active-tab::after {
    content: "";
    position: absolute;
    top: 100%;          /* juste en-dessous de l'onglet = dans la carte */
    width: 14px;
    height: 14px;
    pointer-events: none;
  }
  /* Concave gauche : bg-dark masque la zone inactive, transparent révèle la carte */
  .saisie-onglets button.active-tab::before {
    left: -14px;
    background: radial-gradient(circle at 100% 0%, transparent 14px, var(--bg-dark) 14.5px);
  }
  /* Concave droite */
  .saisie-onglets button.active-tab::after {
    right: -14px;
    background: radial-gradient(circle at 0% 0%, transparent 14px, var(--bg-dark) 14.5px);
  }
  .saisie-onglets button:first-child.active-tab::before { display: none; }
  .saisie-onglets button:last-child.active-tab::after  { display: none; }

  .saisie-bloc {
    position: relative;
    z-index: 1;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .pin-dot { width:14px; height:14px; border-radius:50%; border:1.5px solid #555; background:transparent; transition:background 0.1s, border-color 0.1s; }
  .pin-dot.filled { background:#e8e8e8; border-color:#e8e8e8; }
  .pin-dot.error { background:var(--loss); border-color:var(--loss); }
  
  .pin-key { width:72px; height:72px; border-radius:50%; border:1px solid #2a2a2a; background:#141414; color:#e8e8e8; font-size:24px; font-family:var(--mono); cursor:pointer; display:flex; align-items:center; justify-content:center; -webkit-tap-highlight-color:transparent; user-select:none; }
  .pin-key:active { background:#242424; }
  .pin-key.del { font-size:22px; color:#888; }
  
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
  .shake { animation:shake 0.35s ease; }

  @keyframes pin-pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.5);opacity:0.4} }
  .pin-dot.loading {
    background: #e8e8e8;
    border-color: #e8e8e8;
    animation: pin-pulse 1.1s ease-in-out infinite;
  }
  .pin-dot.loading:nth-child(1){animation-delay:0s}
  .pin-dot.loading:nth-child(2){animation-delay:.15s}
  .pin-dot.loading:nth-child(3){animation-delay:.3s}
  .pin-dot.loading:nth-child(4){animation-delay:.45s}
  .pin-dot.loading:nth-child(5){animation-delay:.6s}

  @keyframes fade-in { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .connecting-label { animation: fade-in 0.4s ease forwards; }
</style>
</head>
<body>
<div id="root"></div>

<script>
/* ════ CONFIGURATION APP SCRIPT ════ */
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx8qVAaxyAJyYM1SNmufGlh3oc36YS_e0S_nLbcbZVug_DHIf_SYwV3QYlNPlurerU/exec';

/* ════ CONSTANTES & UTILITAIRES ════ */
const MFR=['JAN', 'FÉV', 'MAR', 'AVR', 'MAI', 'JUIN', 'JUIL', 'AOÛT', 'SEPT', 'OCT', 'NOV', 'DÉC'];
const mKey=(y,m)=>y+'-'+String(m).padStart(2,'0');
const mLbl=k=>{const[y,m]=k.split('-');return MFR[+m-1]+' '+y;};
const mShrt=k=>{const[y,m]=k.split('-');return MFR[+m-1]+' '+y;};
const mStep=(k,d)=>{let[y,m]=k.split('-').map(Number);const n=m+d;return n>12?mKey(y+1,n-12):n<1?mKey(y-1,n+12):mKey(y,n);};

const START_KEY='2025-09', OBS_END='2025-10', CURR_KEY='2026-05';
const PERSONS=['anas','hicham','saad'];

const P_COLOR={anas:'#ffb347',hicham:'#7ed9a0',saad:'#93c5fd'};
const P_BG={anas:'rgba(255,179,71,.1)',hicham:'rgba(126,217,160,.1)',saad:'rgba(147,197,253,.1)'};
const P_BORD={anas:'rgba(255,179,71,.3)',hicham:'rgba(126,217,160,.3)',saad:'rgba(147,197,253,.3)'};

const FORM_MONTHS=(()=>{
  const a=[];
  let k = START_KEY;
  while(k <= CURR_KEY) {
    a.push(k);
    k = mStep(k, 1);
  }
  return a;
})();

/* ════ DONNÉES PAR DÉFAUT ════ */
const DEF_CFG={
  stakes:{success:20,failure:100},
  persons:{
    anas:{name:'Anas',startKg:89.0,targetLoss:1.5,kcalMin:630,mandat:'kg'},
    hicham:{name:'Hicham',startKg:115.1,targetLoss:1.5,kcalMin:840,mandat:'kg'},
    saad:{name:'Saad',startKg:94.5,targetLoss:1.5,kcalMin:830,mandat:'kcal'},
  }
};

const DEF_DATA={
  '2025-09':{anas:{kg:86.4,kcal:771},hicham:{kg:112.0,kcal:760},saad:{kg:null,kcal:null}},
  '2025-10':{anas:{kg:86.2,kcal:674},hicham:{kg:109.5,kcal:780},saad:{kg:91.55,kcal:877}},
  '2025-11':{anas:{kg:null,kcal:699},hicham:{kg:109.8,kcal:859},saad:{kg:90.45,kcal:714}},
  '2025-12':{anas:{kg:89.0,kcal:574},hicham:{kg:111.6,kcal:769},saad:{kg:93.55,kcal:486}},
  '2026-01':{anas:{kg:null,kcal:631},hicham:{kg:109.2,kcal:847},saad:{kg:92.15,kcal:542}},
  '2026-02':{anas:{kg:null,kcal:648},hicham:{kg:111.3,kcal:786},saad:{kg:null,kcal:849}},
  '2026-03':{anas:{kg:null,kcal:null},hicham:{kg:112.9,kcal:769},saad:{kg:null,kcal:777}},
  '2026-04':{anas:{kg:89.3,kcal:656},hicham:{kg:112.9,kcal:891},saad:{kg:null,kcal:796}},
};

const DEF_MANUAL={'2026-01':{saad:20}};

/* ════ ETAT GLOBAL ════ */
const LS='getfit_v2';
function load(){try{const r=JSON.parse(localStorage.getItem(LS));if(r&&r.config&&r.data)return r;}catch(e){}return null;}
const saved=load();

let S={
  tab:'suivi',
  config:saved?saved.config:JSON.parse(JSON.stringify(DEF_CFG)),
  data:saved?saved.data:JSON.parse(JSON.stringify(DEF_DATA)),
  manual:saved?saved.manual:JSON.parse(JSON.stringify(DEF_MANUAL)),
  formPerson:'anas', formMonth:CURR_KEY, pickerOpen:false, fKg:'', fKcal:'',
  pin: localStorage.getItem('getfit_pin') || '',
  pinEntry: '',
  pinLoading: false,
  authenticated: localStorage.getItem('getfit_auth') === 'true'
};

function persist(){try{localStorage.setItem(LS,JSON.stringify({config:S.config,data:S.data,manual:S.manual}));}catch(e){}}

function lastSaisieMonth(){
  const fSet=new Set(FORM_MONTHS);
  const allKeys=Object.keys(S.data).filter(k=>fSet.has(k)&&PERSONS.some(p=>{const d=S.data[k]&&S.data[k][p];return d&&(d.kg!=null||d.kcal!=null);}));
  if(!allKeys.length)return CURR_KEY;
  return allKeys.sort().pop();
}

/* ════ SYNCHRONISATION ════ */
let syncTimer=null;

function setSyncStatus(msg, color, dotColor) {
  const elTxt = document.getElementById('sync-text');
  const elDot = document.getElementById('sync-dot');
  if (elTxt) { elTxt.textContent = msg; elTxt.style.color = color; }
  if (elDot) { elDot.style.background = dotColor; }
}

function updateDots() {
  for (let i = 0; i < 5; i++) {
    const dot = document.getElementById('d'+i);
    if(dot) {
      if (i < S.pinEntry.length) dot.classList.add('filled');
      else dot.classList.remove('filled');
    }
  }
}

async function syncLoad(){
  if (!S.pin) { S.authenticated = false; render(); return; }
  setSyncStatus('En cours de synchronisation', '#888', 'var(--gold)');
  try{
    const resp = await fetch(SCRIPT_URL + '?pin=' + encodeURIComponent(S.pin), {cache:'no-store'});
    const remote = await resp.json();
    
    if (remote && remote.status === 'error') {
      S.pin = ''; S.authenticated = false; S.pinLoading = false;
      localStorage.removeItem('getfit_pin'); localStorage.removeItem('getfit_auth');
      S.pinEntry = '';
      render();
      const dots = document.getElementById('pin-dots');
      if (dots) {
        dots.classList.add('shake');
        document.querySelectorAll('.pin-dot').forEach(d => d.classList.add('error'));
        setTimeout(() => {
          dots.classList.remove('shake');
          document.querySelectorAll('.pin-dot').forEach(d => d.classList.remove('error'));
        }, 600);
      }
      return;
    }
    
    if(remote && remote.data && Object.keys(remote.data).length > 0){
      S.config = remote.config || S.config; S.data = remote.data; S.manual = remote.manual || S.manual;
      persist();
    }
    
    S.authenticated = true; S.pinLoading = false; localStorage.setItem('getfit_auth', 'true');
    setSyncStatus('Synchronisé', '#888', 'var(--win)');
    render();
  }catch(e){
    S.pinLoading = false;
    if (localStorage.getItem('getfit_auth') === 'true') {
      S.authenticated = true; render(); setSyncStatus('Échec synchronisation', '#888', 'var(--loss)');
    } else {
      S.authenticated = false; S.pinEntry = ''; render();
      const dots = document.getElementById('pin-dots');
      if (dots) {
        dots.classList.add('shake');
        setTimeout(() => { dots.classList.remove('shake'); }, 600);
      }
    }
  }
}

async function syncSave(changes){
  setSyncStatus('En cours de synchronisation', '#888', 'var(--gold)');
  try{
    await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({pin: S.pin, state:{config:S.config,data:S.data,manual:S.manual},changes:changes||[]})});
    setSyncStatus('Synchronisé', '#888', 'var(--win)');
  }catch(e){
    setSyncStatus('Échec synchronisation', '#888', 'var(--loss)');
  }
}

function makeChange(person,monthKey,kg,kcal,note){
  const pc=S.config.persons[person];
  let k2=mStep(monthKey,-1); let prevKg2=pc.startKg;
  for(let i=0;i<80;i++){if(k2<START_KEY)break;const d2=S.data[k2]&&S.data[k2][person];if(d2&&d2.kg!=null){prevKg2=d2.kg;break;}k2=mStep(k2,-1);}
  const lk=kg!=null?+(prevKg2-kg).toFixed(2):null;
  const wOk=lk!=null&&lk>=pc.targetLoss; const kOk=kcal!=null&&kcal>=pc.kcalMin;
  
  let pass;
  if (person === 'saad') {
    pass = kOk; 
  } else {
    pass = (monthKey < '2025-12') ? (wOk || kOk) : wOk;
  }
  
  return{month:monthKey,person,kg:kg??null,kcal:kcal??null,pass,amount:pass?S.config.stakes.success:S.config.stakes.failure,note:note||'saisie'};
}

function scheduleSave(changes){persist();clearTimeout(syncTimer);syncTimer=setTimeout(()=>syncSave(changes),800);}

/* ════ LOGIQUE MÉTIER ════ */
function prevKgFor(person,key){
  let k=mStep(key,-1);
  for(let i=0;i<80;i++){
    if(k<START_KEY)break;
    const d=S.data[k]&&S.data[k][person];
    if(d&&d.kg!=null)return d.kg;
    k=mStep(k,-1);
  }
  return S.config.persons[person].startKg;
}

function computeEntry(person,key){
  const pc = S.config.persons[person];
  if(key <= OBS_END) return {pass:true, amount:S.config.stakes.success, reason:'obs'};
  
  const d = (S.data[key] && S.data[key][person]) || {};
  const prevKg = prevKgFor(person,key);
  
  const lossKg = d.kg != null ? +(prevKg - d.kg).toFixed(2) : null; 
  const wOk = lossKg != null && lossKg >= pc.targetLoss;
  const kOk = d.kcal != null && d.kcal >= pc.kcalMin;
  
  let pass, reason;

  if (person === 'saad') {
    pass = kOk;
    reason = pass ? (d.kcal + ' kcal ✓') : ((d.kcal != null ? d.kcal : '—') + ' kcal < ' + pc.kcalMin);
  } else {
    if (key < '2025-12') {
      pass = wOk || kOk;
      reason = pass ? (wOk ? '−'+lossKg+' kg ✓' : d.kcal+' kcal ✓') : 'Échec global';
    } else {
      pass = wOk;
      reason = pass ? '−'+lossKg+' kg ✓' : (lossKg != null ? '−'+lossKg+' kg < '+pc.targetLoss : 'Poids manquant');
    }
  }

  return {pass, amount: pass ? S.config.stakes.success : S.config.stakes.failure, reason};
}

function amountFor(person,key){
  const auto=computeEntry(person,key);
  const man=S.manual[key]&&S.manual[key][person];
  if(man!==undefined)return{...auto,amount:man,pass:man===S.config.stakes.success};
  return auto;
}

function displayKeys(){
  const set=new Set();
  Object.keys(S.data).forEach(k=>{
    if(PERSONS.some(p=>{const d=S.data[k]&&S.data[k][p];return d&&(d.kg!=null||d.kcal!=null);}))set.add(k);
  });
  return Array.from(set).sort().reverse();
}

const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function badge(e,key,p){
  if(!e)return '';
  const c=e.pass?'var(--win)':'var(--loss)';
  const bg=e.pass?'rgba(61,220,132,.08)':'rgba(255,69,69,.08)';
  const bd=e.pass?'rgba(61,220,132,.2)':'rgba(255,69,69,.2)';
  return '<span class="mono" data-act="toggle" data-month="'+esc(key)+'" data-person="'+p+'" '+
    'style="font-size:12px;font-weight:500;cursor:pointer;user-select:none;flex-shrink:0;color:'+c+';padding:2px 7px;border-radius:4px;background:'+bg+';border:1px solid '+bd+';">'+e.amount+'€</span>';
}

function editCell(key,person,field,value){
  const isKcal=field==='kcal';
  const lbl=value!=null?esc(value)+(isKcal?' kcal':' kg'):'—';
  const col=value!=null?(isKcal?'#777':'#e8e8e8'):'#2a2a2a';
  return '<span class="edt" data-act="editcell" data-month="'+esc(key)+'" data-person="'+person+'" data-field="'+field+'" data-val="'+(value!=null?esc(value):'')+'" style="color:'+col+';font-size:10px">'+lbl+'</span>';
}

/* ════ RENDU HTML ════ */
function renderSuivi(){
  let h = '';
  const curP = S.formPerson;
  const activeColor = P_COLOR[curP];

  let blocRadius = '16px 16px 16px 16px';
  if (curP === 'anas') blocRadius = '0 16px 16px 16px';
  if (curP === 'saad') blocRadius = '16px 0 16px 16px';

  // ── Onglet flottant AU-DESSUS du bloc (sort du cadre)
  const bR = curP==='anas'?'0 12px 12px 12px':curP==='saad'?'12px 0 12px 12px':'12px 12px 12px 12px';
  h+='<div class="saisie-wrapper" style="--tab-bg:'+P_BG[curP]+';--tab-bord:'+P_BORD[curP]+';--tab-col:'+P_COLOR[curP]+'">';

  h+='<div class="saisie-onglets">';
  PERSONS.forEach(p=>{
    const sel=p===curP;
    h+='<button data-act="fperson" data-val="'+p+'" '+(sel?'class="active-tab"':'')+'>'+S.config.persons[p].name+'</button>';
  });
  h+='</div>';

  // Le bloc garde sa bordure COMPLÈTE — l'onglet actif (margin-bottom:-1px) la cache en haut
  h+='<div class="saisie-bloc" style="background:'+P_BG[curP]+';border:1px solid '+P_BORD[curP]+';border-top:none;border-radius:'+bR+';">';

  // Mois picker
  h+='<div style="position:relative;">';
  h+='<button data-act="picker" style="width:100%;padding:10px 14px;background:rgba(255,255,255,.07);border:none;border-radius:8px;color:#e8e8e8;font-family:var(--mono);font-size:12px;text-align:left;display:flex;justify-content:space-between;align-items:center;box-sizing:border-box;"><span>'+mLbl(S.formMonth).toUpperCase()+'</span><span style="color:'+P_COLOR[curP]+'">'+(S.pickerOpen?'▲':'▼')+'</span></button>';
  if(S.pickerOpen){
    h+='<div data-act="picker-bg" style="position:fixed;inset:0;z-index:98"></div>';
    h+='<div id="picker-list" style="position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:99;background:#141414;border:1px solid #2a2a2a;border-radius:10px;max-height:220px;overflow-y:auto;box-shadow:0 8px 28px rgba(0,0,0,.6)">';
    FORM_MONTHS.forEach(m=>{
      const on=m===S.formMonth;
      h+='<div data-act="pick" data-val="'+m+'"'+(on?' data-sel="1"':'')+' style="padding:12px 14px;cursor:pointer;font-family:var(--mono);font-size:12px;border-bottom:1px solid #1a1a1a;background:'+(on?'rgba(240,192,64,.07)':'transparent')+';color:'+(on?'var(--gold)':'#888')+'">'+mLbl(m).toUpperCase()+'</div>';
    });
    h+='</div>';
  }
  h+='</div>';

  // Inputs + bouton
  h+='<div style="display:flex;gap:8px;align-items:stretch;min-width:0;">';
  h+='<input id="f-kg" type="number" inputmode="decimal" placeholder="KG" value="'+esc(S.fKg)+'" style="flex:1;min-width:0;padding:10px 12px;background:rgba(255,255,255,.07);border:none;border-radius:8px;color:#e8e8e8;font-family:var(--mono);font-size:13px;outline:none;">';
  h+='<input id="f-kcal" type="number" inputmode="numeric" placeholder="KCAL" value="'+esc(S.fKcal)+'" style="flex:1;min-width:0;padding:10px 12px;background:rgba(255,255,255,.07);border:none;border-radius:8px;color:#e8e8e8;font-family:var(--mono);font-size:13px;outline:none;">';
  h+='<button data-act="add" style="width:40px;height:40px;flex-shrink:0;background:rgba(255,255,255,.07);border:none;border-radius:8px;color:'+P_COLOR[curP]+';font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:var(--mono);">+</button>';
  h+='</div>';

  h+='</div>';
  h+='</div>';
  h+='<div id="preview" style="font-family:var(--mono);font-size:11px;text-align:center;height:0;overflow:visible;margin-top:4px;pointer-events:none;"></div>';

  const keys=displayKeys();
  let total=0;const per={};PERSONS.forEach(p=>per[p]={total:0,w:0,l:0});
  keys.forEach(k=>PERSONS.forEach(p=>{const e=amountFor(p,k);if(!e)return;per[p].total+=e.amount;total+=e.amount;e.pass?per[p].w++:per[p].l++;}));
  h+='<div style="background:rgba(240,192,64,.05);border:1px solid rgba(240,192,64,.15);border-radius:12px;padding:16px;margin-bottom:8px">';
  h+='<div class="mono" style="font-size:9px;letter-spacing:.2em;color:rgba(240,192,64,.4);text-transform:uppercase;margin-bottom:6px">Caisse commune</div>';
  h+='<div class="mono" style="font-size:42px;font-weight:700;color:var(--gold);line-height:1;margin-bottom:16px">'+total+'€</div>';
  h+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">';
  PERSONS.forEach(p=>{
    h+='<div style="background:'+P_BG[p]+';border-radius:8px;padding:10px;border:1px solid '+P_BORD[p]+'">'+
       '<div class="mono" style="font-size:9px;color:'+P_COLOR[p]+';margin-bottom:4px;text-transform:uppercase">'+S.config.persons[p].name+'</div>'+
       '<div class="mono" style="font-size:18px;color:'+P_COLOR[p]+'">'+per[p].total+'€</div>'+
       '<div class="mono" style="font-size:8px;color:#555;margin-top:4px"><span>'+per[p].w+'×20</span> · <span>'+per[p].l+'×100</span></div></div>';
  });
  h+='</div></div>';

  if(keys.length===0){h+='<div style="text-align:center;color:#333;font-family:var(--mono);font-size:10px;padding:30px 0">Aucune saisie pour l\'instant</div>';}
  keys.forEach(key=>{
    const isObs=key<=OBS_END;
    let mTot=0;PERSONS.forEach(p=>{const e=amountFor(p,key);if(e)mTot+=e.amount;});
    h+='<div class="card" style="padding:12px;margin-bottom:8px">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'+
       '<div style="display:flex;align-items:center;gap:8px">'+
       '<span class="mono" style="font-size:11px;color:'+(isObs?'#484848':'#888')+';letter-spacing:.1em;text-transform:uppercase">'+mShrt(key)+'</span>'+
       (isObs?'<span class="mono" style="font-size:7px;color:#333;border:1px solid #1f1f1f;border-radius:4px;padding:2px 4px">obs</span>':'')+
       '</div><span class="mono" style="font-size:13px;color:#666">'+mTot+'€</span></div>';
    h+='<div style="display:flex;flex-direction:column;gap:10px">';
    PERSONS.forEach(p=>{
      const d=(S.data[key]&&S.data[key][p])||{};
      const e=amountFor(p,key);
      h+='<div style="display:flex;align-items:center;gap:8px">'+
         '<span class="mono" style="font-size:10px;color:'+P_COLOR[p]+';width:52px;flex-shrink:0;text-transform:uppercase">'+S.config.persons[p].name+'</span>'+
         '<div style="flex:1;display:flex;gap:14px;font-family:var(--mono);align-items:center">'+
         editCell(key,p,'kg',d.kg!=null?d.kg:null)+
         editCell(key,p,'kcal',d.kcal!=null?d.kcal:null)+
         '</div>'+badge(e,key,p)+'</div>';
    });
    h+='</div></div>';
  });
  return h;
}

function renderLegend(){
  let h='<div style="display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap">';
  PERSONS.forEach(p=>{
    h+='<div style="display:flex;align-items:center;gap:6px">'+
       '<svg width="20" height="4" style="flex-shrink:0;overflow:visible"><line x1="0" y1="2" x2="20" y2="2" stroke="'+P_COLOR[p]+'" stroke-width="2.5"/><circle cx="10" cy="2" r="2.5" fill="'+P_COLOR[p]+'"/></svg>'+
       '<span style="font-family:var(--mono);font-size:10px;text-transform:uppercase;color:'+P_COLOR[p]+'">'+S.config.persons[p].name+'</span></div>';
  });
  return h+'</div>';
}

function renderChart(field){
  const keys=Object.keys(S.data).filter(k=>PERSONS.some(p=>{const d=S.data[k]&&S.data[k][p];return d&&d[field]!=null;})).sort();
  if(!keys.length)return '<div style="text-align:center;padding:24px;font-family:var(--mono);font-size:10px;color:#333">Aucune donnée</div>';

  const W=350,H=190,ml=36,mr=14,mt=16,mb=40;
  const cW=W-ml-mr,cH=H-mt-mb;
  const n=keys.length;
  const allV=[];
  PERSONS.forEach(p=>keys.forEach(k=>{const d=S.data[k]&&S.data[k][p];if(d&&d[field]!=null)allV.push(d[field]);}));
  const vMin=Math.min(...allV),vMax=Math.max(...allV);
  const pad=(vMax-vMin)*0.15||2;
  const yLo=vMin-pad, yHi=vMax+pad;
  const xOf=i=>ml+(n>1?(i/(n-1))*cW:cW/2);
  const yOf=v=>mt+cH-((v-yLo)/(yHi-yLo))*cH;

  let s='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;overflow:visible">';
  s+='<rect x="'+ml+'" y="'+mt+'" width="'+cW+'" height="'+cH+'" fill="#0e0e0e" rx="4"/>';

  for(let i=0;i<=4;i++){
    const v=yLo+(yHi-yLo)*i/4, y=yOf(v);
    s+='<line x1="'+ml+'" y1="'+y.toFixed(1)+'" x2="'+(ml+cW)+'" y2="'+y.toFixed(1)+'" stroke="#1d1d1d" stroke-width="1"/>';
    s+='<text x="'+(ml-6)+'" y="'+(y+3).toFixed(1)+'" text-anchor="end" font-family="DM Mono,monospace" font-size="8" fill="#444">'+Math.round(v)+'</text>';
  }

  keys.forEach((k,i)=>{
    const x=xOf(i).toFixed(1), yL=(mt+cH+10).toFixed(1);
    s+='<text transform="rotate(-38,'+x+','+yL+')" x="'+x+'" y="'+yL+'" text-anchor="end" font-family="DM Mono,monospace" font-size="8" fill="#555">'+mShrt(k)+'</text>';
  });

  PERSONS.forEach(p=>{
    const col=P_COLOR[p];
    const pts=keys.map((k,i)=>{const d=S.data[k]&&S.data[k][p];const v=d&&d[field]!=null?d[field]:null;return{x:xOf(i),y:v!=null?yOf(v):null,v};});
    let path='',pr=false;
    pts.forEach(pt=>{if(pt.y!=null){path+=(pr?'L':'M')+pt.x.toFixed(1)+' '+pt.y.toFixed(1)+' ';pr=true;}else pr=false;});
    if(path)s+='<path d="'+path+'" fill="none" stroke="'+col+'" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>';
    const lastIdx=pts.reduce((li,pt,i)=>pt.y!=null?i:li,-1);
    const firstIdx=pts.findIndex(pt=>pt.y!=null);
    pts.forEach((pt,i)=>{
      if(pt.y==null)return;
      s+='<circle cx="'+pt.x.toFixed(1)+'" cy="'+pt.y.toFixed(1)+'" r="3" fill="'+col+'"/>';
      if(i===lastIdx){
        const tx=(pt.x+6).toFixed(1), ty=(pt.y+4).toFixed(1);
        s+='<text x="'+tx+'" y="'+ty+'" font-family="DM Mono,monospace" font-size="8" fill="'+col+'">'+pt.v+'</text>';
      } else if(i===firstIdx && firstIdx!==lastIdx){
        // Label au-dessus et à gauche pour éviter le masquage par la courbe
        const tx=(pt.x-6).toFixed(1), ty=(pt.y-5).toFixed(1);
        s+='<text x="'+tx+'" y="'+ty+'" text-anchor="end" font-family="DM Mono,monospace" font-size="8" fill="'+col+'" opacity="0.8">'+pt.v+'</text>';
      }
    });
  });
  return s+'</svg>';
}

  let h='<div style="display:flex;flex-direction:column;gap:8px">';
  [['kg','Poids (kg)'],['kcal','Calories (kcal/j)']].forEach(([f,t])=>{

  });

}

      ? [['persons.'+p+'.kcalMin', pc.kcalMin, '0', 'kcal / jour', '']]
      : [['persons.'+p+'.kcalMin', pc.kcalMin, '0', 'kcal / jour', ''],
         ['persons.'+p+'.targetLoss', pc.targetLoss, '1', 'kg / mois', '−']];

    h+='<div style="background:'+P_BG[p]+';border:1px solid '+P_BORD[p]+';border-radius:12px;padding:18px">';
    h+='<div class="mono" style="font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:'+P_COLOR[p]+';margin-bottom:16px">'+pc.name+'</div>';
    h+='<div style="display:flex;gap:10px">';
    fields.forEach(([path,val,dec,unit,pre])=>{
      h+='<div style="flex:1;background:#0b0b0b;border-radius:10px;padding:14px 14px 12px">';
      h+='<div class="mono" style="font-size:8px;color:#444;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">'+unit+'</div>';

      h+='</div></div>';

function render(){
  if (!S.authenticated) {
    let h = '<div style="position:fixed;inset:0;background:var(--bg-dark);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3rem;">';

    if (S.pinLoading) {
      // ── État : vérification en cours ──
      h += '<div id="pin-dots" style="display:flex;gap:14px;">';
      for(let i=0; i<5; i++) h += '<div class="pin-dot loading"></div>';
      h += '</div>';
      h += '<div class="connecting-label" style="font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#444;">Connexion en cours</div>';
    } else {
      // ── État : saisie du code ──
      h += '<div class="pin-dots" id="pin-dots" style="display:flex;gap:14px;">';
      for(let i=0; i<5; i++) {
        const filled = (S.pinEntry && i < S.pinEntry.length) ? ' filled' : '';
        h += '<div class="pin-dot'+filled+'" id="d'+i+'"></div>';
      }
      h += '</div>';
      h += '<div class="pin-pad" style="display:grid;grid-template-columns:repeat(3,72px);gap:16px;">';
      [1,2,3,4,5,6,7,8,9].forEach(n => {
        h += '<div class="pin-key" data-act="pin-key" data-val="'+n+'">'+n+'</div>';
      });
      h += '<div class="pin-key empty" style="border:none;background:transparent;cursor:default;"></div>';
      h += '<div class="pin-key" data-act="pin-key" data-val="0">0</div>';
      h += '<div class="pin-key del" data-act="pin-del">⌫</div>';
      h += '</div>';
    }

    h += '</div>';
    document.getElementById('root').innerHTML = h;
    return;
  }

  let h='<div class="header-container">';
  h+='<header><h1>S.A.H</h1></header>';
  h+='<button class="sync-badge" onclick="syncLoad()">'
   +'<div id="sync-dot" class="sync-dot" style="background:'+(localStorage.getItem('getfit_auth')==='true'?'var(--win)':'#444')+'"></div>'
   +'<span id="sync-text">'+(localStorage.getItem('getfit_auth')==='true'?'Synchronisé':'...')+'</span></button>';
  h+='</div>';

  h+='<div class="tabs">';
  h+='<button class="tab '+(S.tab==='suivi'?'on':'')+'" data-act="tab" data-val="suivi">Suivi</button>';
  h+='<button class="tab '+(S.tab==='evolution'?'on':'')+'" data-act="tab" data-val="evolution">Évolution</button>';
  h+='<button class="tab '+(S.tab==='objectifs'?'on':'')+'" data-act="tab" data-val="objectifs">Objectifs</button>';
  h+='</div>';

  h+=(S.tab==='suivi')?renderSuivi():(S.tab==='evolution')?renderEvolution():renderObjectifs();
  
  h+='<footer style="margin-top:24px;text-align:center;font-family:var(--mono);font-size:10px;color:#333;letter-spacing:.15em;text-transform:uppercase">S.A.H · 2025–2030</footer>';
  document.getElementById('root').innerHTML=h;
  
  bindForm();
  
  if(S.pickerOpen){
    const list=document.getElementById('picker-list');
    if(list){const sel=list.querySelector('[data-sel="1"]');if(sel)list.scrollTop=sel.offsetTop-list.clientHeight/2+sel.clientHeight/2;}
  }
}

function bindForm(){
  const kg=document.getElementById('f-kg'), kc=document.getElementById('f-kcal');
  function upd(){
    S.fKg=kg?kg.value:''; S.fKcal=kc?kc.value:'';
    const el=document.getElementById('preview');if(!el)return;
    const kgN=S.fKg?parseFloat(S.fKg.replace(',','.')):null;
    const kcN=S.fKcal?parseInt(S.fKcal):null;
    if(kgN==null&&kcN==null){el.innerHTML='';return;}
    const bak=S.data[S.formMonth];
    if(!S.data[S.formMonth])S.data[S.formMonth]={};
    S.data[S.formMonth]=Object.assign({},bak,{[S.formPerson]:{kg:kgN,kcal:kcN}});
    const e=computeEntry(S.formPerson,S.formMonth);
    S.data[S.formMonth]=bak;
    el.innerHTML='<span style="color:'+(e.pass?'var(--win)':'var(--loss)')+'">→ <strong style="font-size:12px">'+e.amount+'€</strong><span style="color:#888;margin-left:6px;">'+esc(e.reason)+'</span></span>';
  }
  if(kg)kg.addEventListener('input',upd);
  if(kc)kc.addEventListener('input',upd);
}

function openInlineEdit(el, currentVal, dec, isKcal, onCommit){
  if(el.querySelector('input'))return;
  const input=document.createElement('input');
  input.type='number'; input.inputMode=isKcal?'numeric':'decimal';
  input.className='editinput'+(isKcal?' sm':'');
  input.placeholder=isKcal?'kcal':'kg';
  input.value=currentVal!=null?currentVal:'';
  el.innerHTML=''; el.appendChild(input);
  input.focus(); input.select();
  let committed=false;
  const commit=()=>{
    if(committed)return; committed=true;
    const n=parseFloat(input.value.replace(',','.'));
    onCommit(input.value.trim()===''?null:(isNaN(n)?null:+n.toFixed(dec)));
  };
  input.addEventListener('blur',commit);
  input.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();commit();}if(e.key==='Escape'){committed=true;render();}});
}

function setPath(obj,path,val){const p=path.split('.');let c=obj;for(let i=0;i<p.length-1;i++)c=c[p[i]];c[p[p.length-1]]=val;}

document.addEventListener('click',ev=>{
  const t=ev.target.closest('[data-act]');
  if(!t)return;
  const act=t.getAttribute('data-act');

  if(act === 'pin-key') {
    if(!S.pinEntry) S.pinEntry = '';
    if(S.pinEntry.length < 5) {
      S.pinEntry += t.getAttribute('data-val');
      updateDots();
      if(S.pinEntry.length === 5) {
        S.pin = S.pinEntry;
        localStorage.setItem('getfit_pin', S.pin);
        S.pinLoading = true;
        render();
        syncLoad();
      }
    }
    return;
  }
  
  if(act === 'pin-del') {
    if(S.pinEntry && S.pinEntry.length > 0) {
      S.pinEntry = S.pinEntry.slice(0, -1);
      updateDots();
    }
    return;
  }

  if(act==='tab'){S.tab=t.getAttribute('data-val');S.pickerOpen=false;render();return;}
  if(act==='fperson'){S.formPerson=t.getAttribute('data-val');render();return;}
  if(act==='picker'){S.pickerOpen=!S.pickerOpen;if(S.pickerOpen)S.formMonth=lastSaisieMonth();render();return;}
  if(act==='picker-bg'){S.pickerOpen=false;render();return;}
  if(act==='pick'){S.formMonth=t.getAttribute('data-val');S.pickerOpen=false;render();return;}

  if(act==='add'){
    const kgEl=document.getElementById('f-kg'),kcEl=document.getElementById('f-kcal');
    const kgN=kgEl&&kgEl.value?parseFloat(kgEl.value.replace(',','.')):null;
    const kcN=kcEl&&kcEl.value?parseInt(kcEl.value):null;
    if (kgN == null && kcN == null) return;
    
    const key=S.formMonth,p=S.formPerson;
    if(!S.data[key])S.data[key]={};
    S.data[key]=Object.assign({},S.data[key],{[p]:{kg:kgN,kcal:kcN}});
    if(S.manual[key]&&S.manual[key][p]!==undefined){delete S.manual[key][p];}
    S.fKg='';S.fKcal='';
    const ch=makeChange(p,key,kgN,kcN,'saisie formulaire');
    scheduleSave([ch]);
    render();return;
  }

  if(act==='toggle'){
    const key=t.getAttribute('data-month'),p=t.getAttribute('data-person');
    const e=amountFor(p,key);if(!e)return;
    const nv=e.amount===S.config.stakes.success?S.config.stakes.failure:S.config.stakes.success;
    if(!S.manual[key])S.manual[key]={};
    S.manual[key][p]=nv;
    const d=(S.data[key]&&S.data[key][p])||{};
    const ch={month:key,person:p,kg:d.kg??null,kcal:d.kcal??null,pass:nv===S.config.stakes.success,amount:nv,note:'correction manuelle montant'};
    scheduleSave([ch]);
    render();return;
  }

  if(act==='editcell'){
    const key=t.getAttribute('data-month'),p=t.getAttribute('data-person'),field=t.getAttribute('data-field');
    const curStr=t.getAttribute('data-val');
    const cur=curStr!==''?parseFloat(curStr):null;
    openInlineEdit(t,cur,field==='kg'?2:0,field==='kcal',(val)=>{
      if(!S.data[key])S.data[key]={};
      if(!S.data[key][p])S.data[key][p]={kg:null,kcal:null};
      S.data[key][p][field]=val;
      const d=S.data[key][p];
      const ch=makeChange(p,key,d.kg,d.kcal,'modification inline '+field);
      scheduleSave([ch]);
      render();
    });
    return;
  }

  if(act==='editnum'){
    const path=t.getAttribute('data-path'),dec=+t.getAttribute('data-dec');
    const cur=parseFloat(t.textContent.trim());
    openInlineEdit(t,cur,dec,path.includes('kcal'),(val)=>{
      if(val!=null)setPath(S.config,path,val);
      scheduleSave([]);
      render();
    });
    return;
  }
});

  if(S.data[k]){delete S.data[k];persist();}
