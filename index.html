<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Budget P.</title>
<style>
/* ── Lock screen ── */
#lock-screen { position:fixed;inset:0;background:#1a1a1a;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2rem; }
#lock-screen.hidden { display:none; }
.lock-title { font-size:20px;color:#c8c8c8;letter-spacing:.05em; }
.pin-dots { display:flex;gap:14px; }
.pin-dot { width:14px;height:14px;border-radius:50%;border:2px solid #686868;background:transparent;transition:background .1s; }
.pin-dot.filled { background:#f0f0ee;border-color:#f0f0ee; }
.pin-dot.error { background:#f08888;border-color:#f08888; }
.pin-pad { display:grid;grid-template-columns:repeat(3,72px);gap:12px; }
.pin-key { width:82px;height:82px;border-radius:50%;border:1.5px solid #585858;background:#363636;color:#f0f0ee;font-size:30px;font-family:-apple-system,Arial,sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;user-select:none; }
.pin-key:active { background:#505050; }
.pin-key.del { font-size:22px;color:#d0d0d0; }
.pin-key.empty { border:none;background:transparent;cursor:default; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
.shake { animation:shake .35s ease; }

/* ── Base ── */
*{box-sizing:border-box;margin:0;padding:0;}
html,body{overflow-x:hidden;}
body { font-family:-apple-system,Arial,sans-serif;background:#1a1a1a;color:#f0f0ee;min-height:100vh;padding:.6rem .5rem; }
input[type=number]{-moz-appearance:textfield;}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}

/* ── Header ── */
.header { display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem; }
.mois-label { font-size:21px;font-weight:400;color:#e4e4e2; }
.sync-badge { font-size:13px;display:flex;align-items:center;gap:6px;color:#7dd49c;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;background:#1e3a26;border:1px solid #3d7a4e;border-radius:8px;padding:7px 11px; }
.sync-badge:active { opacity:.6; }
#sync-dot { width:9px;height:9px;border-radius:50%;background:#7dd49c;flex-shrink:0; }
#sync-dot.syncing { background:#f0b85c;animation:pulse .8s infinite; }
#sync-dot.ok { background:#7dd49c; }
#sync-dot.err { background:#f08888; }
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Toast ── */
#toast { position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#383838;border:1px solid #606060;border-radius:8px;padding:10px 18px;font-size:15px;color:#f0f0ee;z-index:500;transition:transform .3s ease,opacity .3s ease;opacity:0;pointer-events:none;white-space:nowrap; }
#toast.show { transform:translateX(-50%) translateY(0);opacity:1; }

/* ── Tabs ── */
.tabs { display:flex;gap:6px;margin-bottom:.75rem; }
.tab { flex:1;padding:13px 8px;border-radius:10px;border:1px solid #585858;background:#2e2e2e;cursor:pointer;font-size:17px;font-weight:500;color:#d0d0d0;text-align:center;-webkit-tap-highlight-color:transparent;transition:background .15s,color .15s; }
.tab.active { background:#f0b85c;color:#1a1a1a;font-weight:700;border-color:#f0b85c;letter-spacing:.01em; }
.panel { display:none; }
.panel.active { display:block; }

/* ── Metric cards ── */
.cards { display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:.75rem; }
.card { background:#2e2e2e;border-radius:8px;padding:8px 10px;border:1px solid #505050;min-width:0; }
.card.green-bg { background:#1a2c1e;border-color:#3a5e42; }
.card.red-bg { background:#2c1a1a;border-color:#5e3a3a; }
.card-label { font-size:14px;color:#b8b8b8;margin-bottom:4px; }
.card-value { font-size:22px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.card-value.green { color:#7dd49c; }
.card-value.red { color:#f08888; }
.card-value.white { color:#f0f0ee; }
.editable-val { background:none;border:none;border-bottom:1.5px dashed #707070;color:#f0f0ee;font-size:22px;font-weight:600;font-family:-apple-system,Arial,sans-serif;width:90px;outline:none;appearance:textfield; }
.editable-val:focus{border-bottom-color:#c0c0c0;}

/* ── Entry form ── */
.entry-form { margin-bottom:.75rem;margin-left:-.5rem;margin-right:-.5rem;padding:10px .5rem;background:#1b231b; }
.entry-row1 { display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px; }
.entry-row2 { display:grid;grid-template-columns:1fr 1fr;gap:7px; }
.entry-form input, .entry-form select {
  padding:13px 10px;border:none;border-radius:7px;
  background:#1c281c;color:#f0f0ee;font-size:17px;
  font-family:-apple-system,Arial,sans-serif;outline:none;width:100%;
}
.entry-form input[type=number]{appearance:textfield;}
.btn-add { width:100%;padding:13px;background:#2d5c3a;border:1px solid #4a8a5c;border-radius:7px;color:#f0f0ee;font-size:26px;cursor:pointer;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center; }
.btn-add:active{background:#3d7a4e;}
.btn-undo { width:100%;padding:13px;background:#3a3a3a;border:1px solid #626262;border-radius:7px;color:#f0f0ee;font-size:26px;cursor:pointer;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center; }
.btn-undo:active{background:#505050;}

/* ── Category groups ── */
.cat-group { margin-bottom:.5rem; }
.cat-header { display:flex;justify-content:space-between;align-items:center;padding:9px 10px;background:#2a2a2a;border-radius:6px 6px 0 0;border-bottom:1px solid #444; }
.cat-header-name { font-size:15px;font-weight:600;color:#e4e4e2;text-transform:uppercase;letter-spacing:.04em; }
.cat-header-right { display:flex;gap:10px;align-items:center; }
.cat-budget { font-size:13px;color:#a8a8a8; }
.cat-reste { font-size:16px;font-weight:600; }
.cat-reste.green{color:#7dd49c;} .cat-reste.red{color:#f08888;}
.entry-row-item { display:flex;align-items:center;padding:11px 10px;border-bottom:1px solid #303030;background:#1e1e1e; }
.entry-row-item:last-child{border-bottom:none;border-radius:0 0 6px 6px;}
.entry-desc { flex:1;font-size:16px;color:#ebebeb; }
.entry-amount { font-size:16px;color:#e0e0e0;font-variant-numeric:tabular-nums;margin-right:10px;white-space:nowrap; }
.btn-del { background:#3a2020;border:1px solid #6a3535;color:#e89898;font-size:15px;cursor:pointer;padding:0;border-radius:7px;-webkit-tap-highlight-color:transparent;min-width:40px;min-height:40px;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
.btn-del:active{background:#502828;}
.cat-empty { padding:12px 10px;font-size:15px;color:#909090;background:#1e1e1e;border-radius:0 0 6px 6px; }

/* ── Budget projeté table ── */
.budget-section { margin-bottom:.75rem;border-radius:6px;overflow:visible; }
.budget-section-title { font-size:15px;color:#e4e4e2;text-transform:uppercase;letter-spacing:.04em;padding:9px 10px;background:#2a2a2a;border-radius:6px 6px 0 0;border-bottom:1px solid #444;margin-bottom:0;font-weight:700; }
.budget-row { display:flex;justify-content:space-between;align-items:center;padding:11px 10px;border-bottom:1px solid #303030;background:#1e1e1e; }
.budget-row:last-child{border-bottom:none;border-radius:0 0 6px 6px;}
.budget-row-label-input { flex:1;background:none;border:none;border-bottom:1.5px dashed #545454;color:#ebebeb;font-size:16px;font-family:-apple-system,Arial,sans-serif;outline:none;padding:0;min-width:0;margin-right:8px; }
.budget-row-label-input:focus{border-bottom-color:#a0a0a0;color:#f0f0ee;}
.budget-input-wrap { display:inline-flex;align-items:stretch; }
.budget-input { width:58px;text-align:center;padding:6px 3px;border-top:1px solid #606060;border-bottom:1px solid #606060;border-left:none;border-right:none;background:#383838;color:#f0f0ee;font-size:15px;font-family:-apple-system,Arial,sans-serif;appearance:textfield;outline:none; }
.budget-input:focus{border-top-color:#b0b0b0;border-bottom-color:#b0b0b0;}
.budget-arr { width:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#d0d0d0;font-size:18px;font-weight:400;user-select:none;-webkit-tap-highlight-color:transparent;background:#383838;border:1px solid #606060;flex-shrink:0; }
.budget-arr.left{border-radius:6px 0 0 6px;}
.budget-arr.right{border-radius:0 6px 6px 0;}
.budget-arr:active{background:#505050;color:#f0f0ee;}
.btn-row-del { background:#3a2020;border:1px solid #6a3535;color:#e89898;font-size:14px;cursor:pointer;padding:0;margin-left:8px;border-radius:6px;-webkit-tap-highlight-color:transparent;flex-shrink:0;min-width:32px;min-height:32px;display:flex;align-items:center;justify-content:center; }
.btn-row-del:active{background:#502828;}
.btn-sec-add { width:100%;padding:11px;background:none;border:1px dashed #606060;border-radius:0 0 6px 6px;color:#b8b8b8;font-size:15px;cursor:pointer;margin-top:0;font-family:-apple-system,Arial,sans-serif;-webkit-tap-highlight-color:transparent; }
.btn-sec-add:active{color:#e8e8e8;border-color:#909090;}

/* ── Amount step buttons ── */
.amount-input-wrap { display:flex;align-items:center;gap:5px;width:100%; }
.amount-input-wrap input { flex:1;min-width:0; }

/* ── Confirmation modal ── */
#modal-confirm { position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:960;display:flex;align-items:center;justify-content:center;padding:1.5rem; }
#modal-confirm.hidden { display:none; }

/* ── Nouveau mois modal ── */
#modal-mois { position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:950;display:flex;align-items:center;justify-content:center;padding:1.5rem; }
#modal-mois.hidden { display:none; }

/* ── Modal report (carryover) ── */
#modal-report { position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:955;display:flex;align-items:center;justify-content:center;padding:1.5rem; }
#modal-report.hidden { display:none; }
.modal-box { background:#282828;border-radius:18px;border:1px solid #707070;padding:2rem 1.5rem;max-width:340px;width:100%;text-align:center; }
.modal-title { font-size:22px;font-weight:700;color:#f0f0ee;margin-bottom:.6rem;line-height:1.35; }
.modal-month { color:#f0b85c; }
.modal-sub { font-size:15px;color:#b0b0b0;margin-bottom:2rem; }
.btn-modal-oui { width:100%;padding:16px;background:#f0b85c;border:none;border-radius:12px;color:#1a1a1a;font-size:19px;font-weight:700;cursor:pointer;margin-bottom:12px;-webkit-tap-highlight-color:transparent; }
.btn-modal-oui:active { background:#d4a44a; }
.btn-modal-non { width:100%;padding:14px;background:none;border:1px solid #686868;border-radius:12px;color:#c0c0c0;font-size:16px;cursor:pointer;-webkit-tap-highlight-color:transparent; }
.btn-modal-non:active { color:#f0f0ee;border-color:#909090; }
.editable-val[readonly] { border-bottom-color:transparent;cursor:default;color:#7dd49c;pointer-events:none; }
.report-info { font-size:12px;margin-top:5px;display:none; }
</style>
</head>
<body>

<div id="toast"></div>

<!-- Nouveau mois modal -->
<div id="modal-mois" class="hidden">
  <div class="modal-box">
    <div class="modal-title">Allez&nbsp;! On attaque <span class="modal-month" id="modal-mois-nom"></span>, t’es prêt ?</div>
    <div class="modal-sub">Le mois dernier sera archivé.</div>
    <button class="btn-modal-oui" onclick="confirmerNouveauMois()">Oui, on y va !</button>
    <button class="btn-modal-non" onclick="postponerNouveauMois()">Non, j’analyse encore ce mois-ci</button>
  </div>
</div>


<!-- Modal report (carryover du reste réel) -->
<div id="modal-report" class="hidden">
  <div class="modal-box">
    <div class="modal-title">Report de <span class="modal-month" id="modal-report-mois"></span></div>
    <div class="modal-sub" id="modal-report-sub" style="margin-bottom:1.5rem;line-height:1.6"></div>
    <div style="background:#1a2c1e;border:1px solid #3a5e42;border-radius:12px;padding:1rem 1.2rem;margin-bottom:1.5rem;text-align:left">
      <div style="font-size:13px;color:#b0b0b0;margin-bottom:4px">Nouveau revenu mensuel</div>
      <div id="modal-report-nouveau" style="font-size:28px;font-weight:700;color:#7dd49c"></div>
    </div>
    <button class="btn-modal-oui" onclick="appliquerReport()">OK, on part avec ça !</button>
  </div>
</div>

<!-- Modal confirmation générique -->
<div id="modal-confirm" class="hidden">
  <div class="modal-box">
    <div class="modal-title" id="modal-confirm-title"></div>
    <div class="modal-sub" id="modal-confirm-sub" style="word-break:break-word;margin-bottom:2rem;"></div>
    <button class="btn-modal-oui" id="modal-confirm-ok" onclick="confirmAction()">Confirmer</button>
    <button class="btn-modal-non" onclick="cancelConfirm()">Annuler</button>
  </div>
</div>

<!-- PIN (5 chiffres) -->
<div id="lock-screen">
  <div class="lock-title">Budget P. — Code d'accès</div>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
    <div class="pin-dot" id="d4"></div>
  </div>
  <div class="pin-pad">
    <div class="pin-key" onclick="pinPress('1')">1</div><div class="pin-key" onclick="pinPress('2')">2</div><div class="pin-key" onclick="pinPress('3')">3</div>
    <div class="pin-key" onclick="pinPress('4')">4</div><div class="pin-key" onclick="pinPress('5')">5</div><div class="pin-key" onclick="pinPress('6')">6</div>
    <div class="pin-key" onclick="pinPress('7')">7</div><div class="pin-key" onclick="pinPress('8')">8</div><div class="pin-key" onclick="pinPress('9')">9</div>
    <div class="pin-key empty"></div><div class="pin-key" onclick="pinPress('0')">0</div><div class="pin-key del" onclick="pinDel()">⌫</div>
  </div>
</div>

<div class="container">
  <!-- Header -->
  <div class="header">
    <div style="display:flex;align-items:baseline;gap:6px">
      <span style="font-size:22px;font-weight:700;color:#f0f0ee;letter-spacing:.02em">BUDGET P.</span>
      <span class="mois-label" id="mois-label">Mai 2026</span>
    </div>
    <div class="sync-badge" onclick="forceSync()" title="Appuyer pour synchroniser"><span id="sync-label">—</span><span id="sync-dot"></span></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="showTab('reel',this)">Dépenses réel</div>
    <div class="tab" onclick="showTab('budget',this)">Budget projeté</div>
  </div>

  <!-- ── ONGLET 1 : DÉPENSES RÉEL ── -->
  <div id="reel" class="panel active">
    <div class="cards" style="margin-bottom:.75rem">
      <div class="card">
        <div class="card-label">Dépensé réel</div>
        <div class="card-value white" id="r-reel">0 DH</div>
      </div>
      <div class="card green-bg">
        <div class="card-label">Reste réel</div>
        <div class="card-value green" id="r-reste-reel">0 DH</div>
      </div>
    </div>

    <div class="entry-form">
      <div class="entry-row1">
        <div class="amount-input-wrap">
          <input type="number" id="e-montant" placeholder="Montant" step="1">
        </div>
        <input type="text" id="e-desc" placeholder="Description">
      </div>
      <div class="entry-row2">
        <select id="e-cat"></select>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">
          <button class="btn-add" onclick="addEntry()">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><line x1="14" y1="5" x2="14" y2="23" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"/><line x1="5" y1="14" x2="23" y2="14" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"/></svg>
          </button>
          <button class="btn-undo" onclick="undoEntry()">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><polyline points="17,6 9,14 17,22" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>
    </div>

    <div id="cat-list"></div>
  </div>

  <!-- ── ONGLET 2 : BUDGET PROJETÉ ── -->
  <div id="budget" class="panel">
    <div class="cards">
      <div class="card">
        <div class="card-label">Revenu mensuel</div>
        <input class="editable-val" id="salaire" type="number" value="10900" oninput="recalc()">
        <div id="report-info" class="report-info"></div>
      </div>
      <div class="card green-bg">
        <div class="card-label">Reste</div>
        <div class="card-value green" id="b-reste">— DH</div>
      </div>
    </div>
    <span id="b-fixes" style="display:none"></span>
    <span id="b-variable" style="display:none"></span>

    <div class="budget-section">
      <div class="budget-section-title">Dépenses variables budgétées</div>
      <div id="sec-variable"></div>
      <button class="btn-sec-add" onclick="addBudgetRow('variable')">+ Ajouter une ligne</button>
    </div>

    <div class="budget-section">
      <div class="budget-section-title">Charges fixes</div>
      <div id="sec-fixes"></div>
      <button class="btn-sec-add" onclick="addBudgetRow('fixes')">+ Ajouter une ligne</button>
    </div>
  </div>
</div>

<script>
  // ── Google Apps Script ───────────────────────────────────────────────────
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxltvVNrZS73M9rRsa77BGebArGk68yllQf7tInWprLvIDyVsvxwBTvq7YMPVbeO2CAfQ/exec';

  // ── PIN (SHA-256 de 48960) ────────────────────────────────────────────────
  const PIN_HASH = 'c9f1e824ac8f66e7b43c117cb0e7fe182d3a30fe0f209345d7c47d0243e5aef5';
  const PIN_LEN  = 5;

  async function hashPin(pin) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  // ── Currency ─────────────────────────────────────────────────────────────
  const fmt  = n => Math.round(n).toLocaleString('fr-FR') + ' DH';
  const fmtD = n => n.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, '\u202f') + ' DH';

  // ── State ─────────────────────────────────────────────────────────────────
  let entries = [], entryId = 0, budgetRowId = 0;
  let salaireFixe = false;
  let pendingResteReel = 0;
  let lastReportAmount = null;
  let lastReportMois = '';

  let budgetSections = {
    variable: [
      {id:1, label:'Électricité & Eau', value:600},
      {id:2, label:'Carburant',         value:800},
      {id:3, label:'Courses',           value:2000},
      {id:4, label:'Voyage',            value:2000}
    ],
    fixes: [
      {id:5, label:'Internet',              value:375},
      {id:6, label:'Téléphone',             value:50},
      {id:7, label:'Investissement (commun)',value:2000},
      {id:8, label:'Salle de sport',        value:500}
    ]
  };
  budgetRowId = 8;

  const getCats = () => budgetSections.variable.map(r => r.label);

  function refreshCatSelect() {
    const sel = document.getElementById('e-cat');
    const cur = sel.value;
    sel.innerHTML = getCats().map(c => `<option${c===cur?' selected':''}>${c}</option>`).join('');
  }

  const gv = id => parseFloat(document.getElementById(id)?.value) || 0;

  // ── Toast ─────────────────────────────────────────────────────────────────
  let toastTimer = null;
  function showToast(msg, duration = 3500) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), duration);
  }

  function updateSalaireDisplay() {
    const input = document.getElementById('salaire');
    const info  = document.getElementById('report-info');
    if (salaireFixe) {
      input.setAttribute('readonly', '');
      if (lastReportAmount !== null && info) {
        const signe = lastReportAmount >= 0 ? '+' : '';
        info.style.color = lastReportAmount >= 0 ? '#7dd49c' : '#f08888';
        info.textContent = `dont ${signe}${fmt(lastReportAmount)} reportés de ${lastReportMois}`;
        info.style.display = 'block';
      }
    } else {
      input.removeAttribute('readonly');
      if (info) info.style.display = 'none';
    }
  }

  function showTab(id, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    el.classList.add('active');
  }

  // ── Calculs ───────────────────────────────────────────────────────────────
  function getFixesTotal()    { return budgetSections.fixes.reduce((s,r) => s+r.value, 0); }
  function getVariableTotal() { return budgetSections.variable.reduce((s,r) => s+r.value, 0); }
  function getVariableBudgetForCat(cat) {
    const row = budgetSections.variable.find(r => r.label.trim().toLowerCase() === cat.trim().toLowerCase());
    return row ? row.value : 0;
  }
  function getReelTotal()       { return entries.reduce((s,e) => s+e.montant, 0); }
  function getSpentByCat(cat)   { return entries.filter(e => e.cat?.trim().toLowerCase() === cat.trim().toLowerCase()).reduce((s,e) => s+e.montant, 0); }

  function recalc() {
    const fixes    = getFixesTotal();
    const variable = getVariableTotal();
    const salaire  = gv('salaire');
    const reste    = salaire - fixes - variable;
    const reelTotal  = getReelTotal();
    const resteReel  = salaire - fixes - reelTotal;

    document.getElementById('b-fixes').textContent    = fmt(fixes);
    document.getElementById('b-variable').textContent = fmt(variable);
    document.getElementById('b-reste').textContent    = fmt(reste);
    document.getElementById('b-reste').className      = 'card-value ' + (reste >= 0 ? 'green' : 'red');

    document.getElementById('r-reel').textContent       = fmt(reelTotal);
    document.getElementById('r-reste-reel').textContent = fmt(resteReel);
    document.getElementById('r-reste-reel').className   = 'card-value ' + (resteReel >= 0 ? 'green' : 'red');
    document.getElementById('r-reste-reel').closest('.card').className = 'card ' + (resteReel >= 0 ? 'green-bg' : 'red-bg');

    refreshCatList();
    save();
  }

  // ── Rendu sections budget ─────────────────────────────────────────────────
  function renderBudgetSection(secKey) {
    const container = document.getElementById('sec-' + secKey);
    if (!container) return;
    container.innerHTML = '';
    budgetSections[secKey].forEach(row => {
      const div = document.createElement('div');
      div.className = 'budget-row';
      div.innerHTML = `
        <input class="budget-row-label-input" type="text" value="${row.label}"
          onchange="updateBudgetRow(${row.id},'label',this.value)">
        <div class="budget-input-wrap">
          <div class="budget-arr left" onclick="stepBudgetRow(${row.id},-10)">−</div>
          <input class="budget-input" type="number" value="${row.value}"
            onchange="updateBudgetRow(${row.id},'value',this.value)">
          <div class="budget-arr right" onclick="stepBudgetRow(${row.id},10)">+</div>
        </div>
        <button class="btn-row-del" onclick="removeBudgetRow('${secKey}',${row.id})">✕</button>`;
      container.appendChild(div);
    });
  }

  function renderAllBudgetSections() {
    ['variable','fixes'].forEach(renderBudgetSection);
    refreshCatSelect();
  }

  function updateBudgetRow(id, field, value) {
    for (const [secKey, sec] of Object.entries(budgetSections)) {
      const row = sec.find(r => r.id === id);
      if (row) {
        if (field === 'value') row.value = parseFloat(value) || 0;
        else row[field] = value;
        if (secKey === 'variable' && field === 'label') refreshCatSelect();
        break;
      }
    }
    recalc();
  }

  function stepBudgetRow(id, delta) {
    for (const sec of Object.values(budgetSections)) {
      const row = sec.find(r => r.id === id);
      if (row) { row.value = Math.max(0, row.value + delta); break; }
    }
    renderAllBudgetSections(); recalc();
  }

  function addBudgetRow(secKey) {
    budgetSections[secKey].push({id:++budgetRowId, label:'Nouvelle ligne', value:0});
    renderBudgetSection(secKey);
    if (secKey === 'variable') refreshCatSelect();
    recalc();
  }

  function removeBudgetRow(secKey, id) {
    if (budgetSections[secKey].length <= 1) return;
    const row = budgetSections[secKey].find(r => r.id === id);
    if (!row) return;
    pendingAction = () => {
      budgetSections[secKey] = budgetSections[secKey].filter(r => r.id !== id);
      renderBudgetSection(secKey);
      if (secKey === 'variable') refreshCatSelect();
      recalc();
    };
    showConfirm('', 'Supprimer cette ligne ?', `${row.label}  —  ${fmt(row.value)}`, 'Oui, supprimer', '#c0392b');
  }

  // ── Rendu liste réel ──────────────────────────────────────────────────────
  function refreshCatList() {
    const container = document.getElementById('cat-list');
    container.innerHTML = '';
    getCats().forEach(cat => {
      const budget = getVariableBudgetForCat(cat);
      const spent  = getSpentByCat(cat);
      const reste  = budget - spent;
      const catEntries = entries.filter(e => e.cat?.trim().toLowerCase() === cat.trim().toLowerCase());

      const grouped = {};
      catEntries.forEach(e => {
        const key = (e.desc || '—').trim().toLowerCase();
        if (!grouped[key]) grouped[key] = { desc:(e.desc||'—').trim(), total:0, ids:[] };
        grouped[key].total += e.montant;
        grouped[key].ids.push(e.id);
      });

      const grp = document.createElement('div');
      grp.className = 'cat-group';
      const clr = reste >= 0 ? 'green' : 'red';
      grp.innerHTML = `
        <div class="cat-header">
          <span class="cat-header-name">${cat}</span>
          <div class="cat-header-right">
            <span class="cat-reste ${clr}">${reste >= 0 ? '+' : ''}${fmt(reste)}</span>
          </div>
        </div>`;

      if (Object.keys(grouped).length === 0) {
        grp.innerHTML += `<div class="cat-empty">Aucune dépense</div>`;
      } else {
        Object.values(grouped).forEach(g => {
          const row = document.createElement('div');
          row.className = 'entry-row-item';
          const badge = g.ids.length > 1 ? ` <span style="font-size:10px;color:#666;margin-left:4px">${g.ids.length}×</span>` : '';
          row.innerHTML = `
            <span class="entry-desc">${g.desc}${badge}</span>
            <span class="entry-amount">${fmt(g.total)}</span>
            <button class="btn-del" onclick="removeGroup('${cat}','${g.desc.replace(/'/g,"\\'")}')">✕</button>`;
          grp.appendChild(row);
        });
      }
      container.appendChild(grp);
    });
  }

  let pendingAction = null;

  function showConfirm(icon, title, sub, btnLabel, btnColor) {
    document.getElementById('modal-confirm-title').textContent = title;
    document.getElementById('modal-confirm-sub').textContent = sub;
    const btn = document.getElementById('modal-confirm-ok');
    btn.textContent = btnLabel;
    btn.style.background = btnColor;
    document.getElementById('modal-confirm').classList.remove('hidden');
  }

  function confirmAction() {
    document.getElementById('modal-confirm').classList.add('hidden');
    if (pendingAction) { pendingAction(); pendingAction = null; }
  }

  function cancelConfirm() {
    document.getElementById('modal-confirm').classList.add('hidden');
    pendingAction = null;
  }

  function removeGroup(cat, desc) {
    const total = entries
      .filter(e => e.cat?.trim().toLowerCase() === cat.trim().toLowerCase() && (e.desc||'—').trim() === desc)
      .reduce((s, e) => s + e.montant, 0);
    pendingAction = () => {
      entries = entries.filter(e => !(e.cat?.trim().toLowerCase() === cat.trim().toLowerCase() && (e.desc||'—').trim() === desc));
      recalc();
    };
    showConfirm('', 'Supprimer cette dépense ?', `${desc}  —  ${fmt(total)}`, 'Oui, supprimer', '#c0392b');
  }

  function addEntry() {
    const montant = parseFloat(document.getElementById('e-montant').value);
    const desc    = document.getElementById('e-desc').value.trim();
    const cat     = document.getElementById('e-cat').value;
    if (!montant || montant <= 0) return;
    entries.push({ id:++entryId, montant, desc, cat });
    document.getElementById('e-montant').value = '';
    document.getElementById('e-desc').value    = '';
    recalc();
  }

  function stepMontant(delta) {
    const input = document.getElementById('e-montant');
    const cur = parseFloat(input.value) || 0;
    input.value = Math.max(0, cur + delta);
  }

  function undoEntry() {
    if (entries.length === 0) return;
    const last = entries[entries.length - 1];
    pendingAction = () => {
      entries.pop();
      recalc();
    };
    showConfirm(
      '',
      'Annuler cette saisie ?',
      `${fmt(last.montant)}  —  ${last.desc || '—'}  (${last.cat})`,
      'Oui, annuler',
      '#f0b85c'
    );
  }

  // ── Sync ─────────────────────────────────────────────────────────────────
  const STORAGE_KEY = 'bp_data';

  function setSyncStatus(state, label) {
    const dot = document.getElementById('sync-dot');
    const lbl = document.getElementById('sync-label');
    dot.className = state;
    lbl.textContent = label || (state === 'syncing' ? 'Sync…' : state === 'ok' ? 'Synchronisé' : 'Hors ligne — script ?');
  }

  function getPayload() {
    return { entries, entryId, budgetSections, budgetRowId,
      mois: document.getElementById('mois-label').textContent, salaire: gv('salaire'),
      salaireFixe, lastReportAmount, lastReportMois };
  }

  function applyData(d) {
    if (d.entries)        entries = d.entries;
    if (d.entryId)        entryId = parseInt(d.entryId);
    if (d.budgetSections) budgetSections = d.budgetSections;
    if (d.budgetRowId)    budgetRowId = parseInt(d.budgetRowId);
    if (d.mois)           document.getElementById('mois-label').textContent = d.mois;
    if (d.salaire)        document.getElementById('salaire').value = d.salaire;
    if (d.salaireFixe !== undefined) salaireFixe = !!d.salaireFixe;
    if (d.lastReportAmount !== undefined) lastReportAmount = d.lastReportAmount;
    if (d.lastReportMois)  lastReportMois = d.lastReportMois;
    updateSalaireDisplay();
  }

  // JSONP loader — bypasses Safari's CORS+redirect block on script.google.com
  function fetchJsonp(url) {
    return new Promise((resolve, reject) => {
      const cb = '_bp' + Date.now();
      const el = document.createElement('script');
      const timer = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, 8000);
      function cleanup() { clearTimeout(timer); delete window[cb]; el.remove(); }
      window[cb] = data => { cleanup(); resolve(data); };
      el.onerror = () => { cleanup(); reject(new Error('script error')); };
      el.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb + '&t=' + Date.now();
      document.head.appendChild(el);
    });
  }

  let saveTimer = null;
  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(getPayload()));
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async () => {
      setSyncStatus('syncing');
      try {
        const url = SCRIPT_URL + '?action=save&data=' + encodeURIComponent(JSON.stringify(getPayload()));
        await fetchJsonp(url);
        setSyncStatus('ok');
      } catch(e) { setSyncStatus('err'); }
    }, 800);
  }

  async function load() {
    setSyncStatus('syncing');
    try {
      const d = await fetchJsonp(SCRIPT_URL);
      if (d && Object.keys(d).length > 0) { applyData(d); setSyncStatus('ok'); }
      else {
        const bk = localStorage.getItem(STORAGE_KEY);
        if (bk) applyData(JSON.parse(bk));
        setSyncStatus('ok');
      }
    } catch(e) {
      const bk = localStorage.getItem(STORAGE_KEY);
      if (bk) { try { applyData(JSON.parse(bk)); } catch(_) {} }
      setSyncStatus('err');
    }
  }

  async function forceSync() {
    await load();
    renderAllBudgetSections();
    refreshCatSelect();
    recalc();
    showToast('Synchronisé');
  }

  // ── Gestion nouveau mois ──────────────────────────────────────────────────
  const MOIS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin',
                   'Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

  function getMoisAttendu() {
    const now = new Date();
    return MOIS_FR[now.getMonth()] + ' ' + now.getFullYear();
  }

  function checkNouveauMois() {
    const moisActuel  = document.getElementById('mois-label').textContent.trim();
    const moisAttendu = getMoisAttendu();
    if (!moisActuel || moisActuel === moisAttendu) return;
    document.getElementById('modal-mois-nom').textContent = moisAttendu;
    document.getElementById('modal-mois').classList.remove('hidden');
  }

  function confirmerNouveauMois() {
    document.getElementById('modal-mois').classList.add('hidden');

    // Le report de reste s'active uniquement à partir de juillet 2026
    const now = new Date();
    const reportActif = now.getFullYear() > 2026 ||
      (now.getFullYear() === 2026 && now.getMonth() >= 6);

    if (!reportActif) {
      _archiverSansReport();
      return;
    }

    const salaire    = gv('salaire');
    const resteReel  = salaire - getFixesTotal() - getReelTotal();
    pendingResteReel = resteReel;

    const moisActuel     = document.getElementById('mois-label').textContent.trim();
    const nouveauSalaire = salaire + resteReel;
    const signe = resteReel >= 0 ? '+' : '';
    const clr   = resteReel >= 0 ? '#7dd49c' : '#f08888';

    document.getElementById('modal-report-mois').textContent = moisActuel;
    document.getElementById('modal-report-sub').innerHTML =
      `Reste réel de ce mois&nbsp;: <strong style="color:${clr}">${signe}${fmt(resteReel)}</strong><br><br>` +
      `Ce montant va s'ajouter à ton revenu mensuel. À partir de maintenant, le revenu est fixe et ne peut plus être modifié manuellement.`;
    document.getElementById('modal-report-nouveau').textContent = fmt(nouveauSalaire);
    document.getElementById('modal-report').classList.remove('hidden');
  }

  async function _archiverSansReport() {
    const moisActuel  = document.getElementById('mois-label').textContent.trim();
    const moisAttendu = getMoisAttendu();
    setSyncStatus('syncing', 'Archivage…');
    showToast('Archivage de ' + moisActuel + '…', 5000);
    try {
      const url = SCRIPT_URL + '?action=archive&mois=' + encodeURIComponent(moisActuel)
                             + '&data=' + encodeURIComponent(JSON.stringify(getPayload()));
      await fetchJsonp(url);
      entries = []; entryId = 0;
      document.getElementById('mois-label').textContent = moisAttendu;
      recalc();
      setSyncStatus('ok');
      showToast('✓ ' + moisActuel + ' archivé — Bienvenue en ' + moisAttendu + ' !', 4000);
    } catch(err) {
      setSyncStatus('err');
      localStorage.setItem('bp_archive_bak_' + moisActuel, JSON.stringify(getPayload()));
      showToast('Archivage échoué — copie locale conservée', 5000);
    }
  }

  async function appliquerReport() {
    document.getElementById('modal-report').classList.add('hidden');

    const moisActuel     = document.getElementById('mois-label').textContent.trim();
    const moisAttendu    = getMoisAttendu();
    const currentSalaire = gv('salaire');
    const nouveauSalaire = currentSalaire + pendingResteReel;

    setSyncStatus('syncing', 'Archivage…');
    showToast('Archivage de ' + moisActuel + '…', 5000);
    try {
      const url = SCRIPT_URL + '?action=archive&mois=' + encodeURIComponent(moisActuel)
                             + '&data=' + encodeURIComponent(JSON.stringify(getPayload()));
      await fetchJsonp(url);
      lastReportAmount = pendingResteReel;
      lastReportMois   = moisActuel;
      entries = []; entryId = 0;
      document.getElementById('salaire').value = nouveauSalaire;
      document.getElementById('mois-label').textContent = moisAttendu;
      salaireFixe = true;
      updateSalaireDisplay();
      recalc();
      setSyncStatus('ok');
      showToast('✓ ' + moisActuel + ' archivé — Bienvenue en ' + moisAttendu + ' !', 4000);
    } catch(err) {
      setSyncStatus('err');
      localStorage.setItem('bp_archive_bak_' + moisActuel, JSON.stringify(getPayload()));
      showToast('Archivage échoué — copie locale conservée', 5000);
    }
  }

  function postponerNouveauMois() {
    document.getElementById('modal-mois').classList.add('hidden');
  }

  // ── PIN 5 chiffres ────────────────────────────────────────────────────────
  let pinEntry = '';

  async function pinPress(d) {
    if (pinEntry.length >= PIN_LEN) return;
    pinEntry += d; updateDots();
    if (pinEntry.length === PIN_LEN) {
      const h = await hashPin(pinEntry);
      if (h === PIN_HASH) {
        sessionStorage.setItem('bp_unlocked','1');
        document.getElementById('lock-screen').classList.add('hidden');
        initApp();
      } else {
        const dots = document.getElementById('pin-dots');
        dots.classList.add('shake');
        document.querySelectorAll('.pin-dot').forEach(d => d.classList.add('error'));
        setTimeout(() => {
          dots.classList.remove('shake');
          document.querySelectorAll('.pin-dot').forEach(d => d.classList.remove('error','filled'));
          pinEntry = '';
        }, 600);
      }
    }
  }

  function pinDel() { pinEntry = pinEntry.slice(0,-1); updateDots(); }
  function updateDots() {
    for (let i = 0; i < PIN_LEN; i++)
      document.getElementById('d'+i).classList.toggle('filled', i < pinEntry.length);
  }

  function initApp() {
    (async () => {
      await load();
      renderAllBudgetSections();
      refreshCatSelect();
      recalc();
      checkNouveauMois();
    })();
  }

  document.addEventListener('focusin', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') {
      setTimeout(() => e.target.scrollIntoView({ behavior:'smooth', block:'center' }), 300);
    }
  });

  if (sessionStorage.getItem('bp_unlocked') === '1') {
    document.getElementById('lock-screen').classList.add('hidden');
    initApp();
  }

  // ── Dev helpers (call from browser console) ───────────────────────────────
  window.bpReset = function() {
    Object.keys(localStorage).filter(k => k.startsWith('bp_')).forEach(k => localStorage.removeItem(k));
    sessionStorage.removeItem('bp_unlocked');
    location.reload();
  };
  window.bpStatus = function() {
    console.log('localStorage keys:', Object.keys(localStorage).filter(k => k.startsWith('bp_')));
    console.log('data:', localStorage.getItem('bp_data'));
  };
</script>
